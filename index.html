<!DOCTYPE html>
<html>
<head>
    <title>Updated Web Page</title>
</head>
<body>
    <h1>Simple Static Web Page - V2</h1>
    <p>CI/CD process is successful!</p>
    <!-- Add a new element to show the update -->
    <div style="color: green;">
        Updated on: <span id="date"></span>
    </div>
    <script>document.getElementById('date').innerText = new Date().toLocaleString();</script>
</body>
</html>
